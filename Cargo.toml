[package]
name = "roxify_native"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "roxify_native"
crate-type = ["cdylib"]
path = "native/lib.rs"

[[bin]]
name = "roxify_native"
path = "native/main.rs"

[dependencies]
napi = "2"
napi-derive = "2"
rayon = "1.7"
zstd = { version = "0.11", features = ["zstdmt"] }
crc32fast = "1.3"
adler = "1.0"
num_cpus = "1.16"
clap = { version = "4", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
