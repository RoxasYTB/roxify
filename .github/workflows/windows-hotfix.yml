name: Windows Hotfix Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-windows-exe:
    name: Build Windows x64 exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-hotfix-x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native exe
        run: cargo build --release --bin roxify_native --target x86_64-pc-windows-msvc

      - name: Smoke test exe
        shell: pwsh
        run: .\target\x86_64-pc-windows-msvc\release\roxify_native.exe --help

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\roxify_native.exe artifacts\roxify_native-windows-x64.exe
          Get-ChildItem artifacts | Format-Table Name,Length -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: roxify-native-windows-x64-hotfix
          path: artifacts/roxify_native-windows-x64.exe
          retention-days: 14
