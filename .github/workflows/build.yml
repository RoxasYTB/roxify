name: Build Native Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll

    env:
      USE_SYSTEM_ZSTD: '1'
      FAST_RELEASE: '1'
      MAX_JOBS: '2'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install libzstd (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install zstd pkg-config || true
          else
            sudo apt-get update && sudo apt-get install -y libzstd-dev pkg-config || true
          fi

      - name: Install zstd on Windows (choco)
        if: runner.os == 'Windows'
        run: choco install zstd -y || true

      - name: Build (fast profile)
        run: cargo build --profile fastdev --lib --no-default-features --target ${{ matrix.target }} $([[ -n "${{ env.MAX_JOBS }}" ]] && echo "-j ${{ env.MAX_JOBS }}" || true)

      - name: Strip binary
        if: runner.os != 'Windows'
        run: |
          if [ "${FAST_RELEASE:-0}" = "1" ]; then pd="fastdev"; else pd="release"; fi
          strip target/${{ matrix.target }}/${pd}/libroxify_native.${{ matrix.ext }} || true

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          if [ "${FAST_RELEASE:-0}" = "1" ]; then pd="fastdev"; else pd="release"; fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/${pd}/roxify_native.${{ matrix.ext }} artifacts/${{ matrix.target }}/libroxify_native.node || true
          else
            cp target/${{ matrix.target }}/${pd}/libroxify_native.${{ matrix.ext }} artifacts/${{ matrix.target }}/libroxify_native.node || true
          fi
          ls -lh artifacts/${{ matrix.target }}/

      - name: Run smoke tests (encode/decode/list + Node API)
        shell: bash
        env:
          SKIP_JS_BUILD: '1'
          SKIP_NATIVE_BUILD: '1'
        run: |
          echo "Running smoke tests on $RUNNER_OS / ${{ matrix.target }}"
          npm run build
          node scripts/copy-native.js
          node scripts/run-integration-tests.cjs || true

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: artifacts/**
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.target }}
          path: output-tests/**
          retention-days: 7
