name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      USE_SYSTEM_ZSTD: '1'
      FAST_RELEASE: '1'
      MAX_JOBS: '2'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          shared-key: 'release'

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - run: npm ci

      - name: Install libzstd (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y libzstd-dev pkg-config || true

      - name: Install zstd on Windows (choco)
        if: runner.os == 'Windows'
        run: choco install zstd -y || true

      - name: Install zstd on Windows (choco)
        if: runner.os == 'Windows'
        run: choco install zstd -y || true

      - name: Build native (fast profile)
        shell: bash
        run: cargo build -p roxify_native --profile fastdev --lib --no-default-features --target ${{ matrix.target }} $([[ -n "${{ env.MAX_JOBS }}" ]] && echo "-j ${{ env.MAX_JOBS }}" || true)

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${FAST_RELEASE:-0}" = "1" ]; then pd="fastdev"; else pd="release"; fi
          strip target/${{ matrix.target }}/${pd}/libroxify_native.* || true

      - run: npm run build

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p release
          if [ "${FAST_RELEASE:-0}" = "1" ]; then pd="fastdev"; else pd="release"; fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/${pd}/roxify_native.dll release/roxify_native-${{ matrix.target }}.node || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp target/${{ matrix.target }}/${pd}/libroxify_native.dylib release/roxify_native-${{ matrix.target }}.node || true
          else
            cp target/${{ matrix.target }}/${pd}/libroxify_native.so release/roxify_native-${{ matrix.target }}.node || true
          fi
          ls -lh release/

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
