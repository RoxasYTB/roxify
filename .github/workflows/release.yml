name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload binaries to (e.g. v1.11.0)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
            libPrefix: true
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            ext: so
            libPrefix: true
            crossPkgs: gcc-multilib g++-multilib
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: so
            libPrefix: true
            crossPkgs: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            crossLinker: aarch64-linux-gnu-gcc
          # ── macOS ──
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dylib
            libPrefix: true
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
            libPrefix: true
          # ── Windows ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll
            libPrefix: false
          - os: windows-latest
            target: i686-pc-windows-msvc
            ext: dll
            libPrefix: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            ext: dll
            libPrefix: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          shared-key: 'release'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install cross-compilation packages (Linux)
        if: runner.os == 'Linux' && matrix.crossPkgs
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.crossPkgs }} pkg-config

      - name: Install libzstd-dev (Linux native)
        if: runner.os == 'Linux' && !matrix.crossPkgs
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev pkg-config || true

      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Build native
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.crossLinker || '' }}
        run: |
          cargo build --release --lib --no-default-features --target ${{ matrix.target }}

      - name: Build CLI binary
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.crossLinker || '' }}
        run: |
          cargo build --release --bin roxify_native --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/libroxify_native.${{ matrix.ext }}
          if [ -f "$BIN" ]; then strip "$BIN" 2>/dev/null || true; fi
          CLI=target/${{ matrix.target }}/release/roxify_native
          if [ -f "$CLI" ]; then strip "$CLI" 2>/dev/null || true; fi

      - run: npm run build

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.libPrefix }}" = "true" ]; then
            SRC=target/${{ matrix.target }}/release/libroxify_native.${{ matrix.ext }}
          else
            SRC=target/${{ matrix.target }}/release/roxify_native.${{ matrix.ext }}
          fi
          cp "$SRC" release/roxify_native-${{ matrix.target }}.node
          # Copy CLI binary if it exists
          if [ "${{ runner.os }}" = "Windows" ]; then
            CLI=target/${{ matrix.target }}/release/roxify_native.exe
            if [ -f "$CLI" ]; then cp "$CLI" release/roxify_native-${{ matrix.target }}.exe; fi
          else
            CLI=target/${{ matrix.target }}/release/roxify_native
            if [ -f "$CLI" ]; then cp "$CLI" release/roxify_native-${{ matrix.target }}; fi
          fi
          ls -lh release/

      - name: Smoke test CLI (macOS)
        if: runner.os == 'macOS' && (matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin')
        shell: bash
        run: |
          CLI=target/${{ matrix.target }}/release/roxify_native
          if [ -f "$CLI" ]; then
            chmod +x "$CLI"
            "$CLI" --help
            echo "CLI smoke test passed for ${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/*
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          for f in release/*; do
            gh release upload "$TAG" "$f" --clobber || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Create macOS universal binary ──
  universal-macos:
    name: Create macOS Universal Binary
    needs: build-and-upload
    if: always() && !cancelled()
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-aarch64-apple-darwin
          path: macos-bins

      - uses: actions/download-artifact@v4
        with:
          name: release-x86_64-apple-darwin
          path: macos-bins

      - name: Create universal CLI binary
        run: |
          mkdir -p release
          ARM=macos-bins/roxify_native-aarch64-apple-darwin
          X86=macos-bins/roxify_native-x86_64-apple-darwin
          if [ -f "$ARM" ] && [ -f "$X86" ]; then
            lipo -create -output release/rox-macos-universal "$ARM" "$X86"
            chmod +x release/rox-macos-universal
            file release/rox-macos-universal
            cp release/rox-macos-universal release/roxify_native-universal-apple-darwin
            chmod +x release/roxify_native-universal-apple-darwin
            echo "Universal binary created successfully"
          else
            echo "Warning: one or both macOS CLI binaries not found, skipping universal"
            ls -lhR macos-bins/
          fi

      - name: Create universal .node module
        run: |
          ARM_NODE=macos-bins/roxify_native-aarch64-apple-darwin.node
          X86_NODE=macos-bins/roxify_native-x86_64-apple-darwin.node
          if [ -f "$ARM_NODE" ] && [ -f "$X86_NODE" ]; then
            lipo -create -output release/roxify_native-universal-apple-darwin.node "$ARM_NODE" "$X86_NODE"
            echo "Universal .node module created"
          fi

      - name: Smoke test universal binary
        run: |
          if [ -f release/rox-macos-universal ]; then
            ./release/rox-macos-universal --help
            echo "Universal CLI smoke test passed"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-universal-apple-darwin
          path: release/*
          retention-days: 30

      - name: Upload universal binary to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          for f in release/*; do
            gh release upload "$TAG" "$f" --clobber || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to npm with all binaries ──
  publish:
    name: Publish to npm
    needs: [build-and-upload, universal-macos]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: native-binaries
          pattern: release-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: release-universal-apple-darwin
          path: native-binaries
        continue-on-error: true

      - name: Copy all native binaries to package root
        run: |
          cp native-binaries/*.node . 2>/dev/null || true
          mkdir -p dist
          if [ -f native-binaries/roxify_native-x86_64-pc-windows-msvc.exe ]; then
            cp native-binaries/roxify_native-x86_64-pc-windows-msvc.exe dist/roxify_native.exe
          fi
          if [ -f native-binaries/roxify_native-x86_64-unknown-linux-gnu ]; then
            cp native-binaries/roxify_native-x86_64-unknown-linux-gnu dist/roxify_native
            chmod +x dist/roxify_native
          fi
          if [ -f native-binaries/roxify_native-aarch64-apple-darwin ]; then
            cp native-binaries/roxify_native-aarch64-apple-darwin dist/roxify_native-macos-arm64
            chmod +x dist/roxify_native-macos-arm64
          fi
          if [ -f native-binaries/roxify_native-x86_64-apple-darwin ]; then
            cp native-binaries/roxify_native-x86_64-apple-darwin dist/roxify_native-macos-x64
            chmod +x dist/roxify_native-macos-x64
          fi
          if [ -f native-binaries/rox-macos-universal ]; then
            cp native-binaries/rox-macos-universal dist/rox-macos-universal
            chmod +x dist/rox-macos-universal
          fi
          ls -lh *.node dist/

      - run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
