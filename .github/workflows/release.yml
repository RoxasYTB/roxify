name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
            libPrefix: true
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            ext: so
            libPrefix: true
            crossPkgs: gcc-multilib g++-multilib
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: so
            libPrefix: true
            crossPkgs: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            crossLinker: aarch64-linux-gnu-gcc
          # ── macOS ──
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dylib
            libPrefix: true
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
            libPrefix: true
          # ── Windows ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: dll
            libPrefix: false
          - os: windows-latest
            target: i686-pc-windows-msvc
            ext: dll
            libPrefix: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            ext: dll
            libPrefix: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          shared-key: 'release'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install cross-compilation packages (Linux)
        if: runner.os == 'Linux' && matrix.crossPkgs
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.crossPkgs }} pkg-config

      - name: Install libzstd-dev (Linux native)
        if: runner.os == 'Linux' && !matrix.crossPkgs
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev pkg-config || true

      - name: Build native
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.crossLinker || '' }}
        run: |
          cargo build --release --lib --no-default-features --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/libroxify_native.${{ matrix.ext }}
          if [ -f "$BIN" ]; then strip "$BIN" 2>/dev/null || true; fi

      - run: npm run build

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.libPrefix }}" = "true" ]; then
            SRC=target/${{ matrix.target }}/release/libroxify_native.${{ matrix.ext }}
          else
            SRC=target/${{ matrix.target }}/release/roxify_native.${{ matrix.ext }}
          fi
          cp "$SRC" release/roxify_native-${{ matrix.target }}.node
          ls -lh release/

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/*.node
          retention-days: 30

  # ── Publish to npm with all binaries ──
  publish:
    name: Publish to npm
    needs: build-and-upload
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: native-binaries
          pattern: release-*
          merge-multiple: true

      - name: Copy all native binaries to package root
        run: |
          cp native-binaries/*.node .
          ls -lh *.node

      - run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
