name: Windows & Wine smoke tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install & build
        run: |
          npm ci
          npm run build
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install zstd (choco)
        if: runner.os == 'Windows'
        run: choco install zstd -y || true
      - name: Build native & copy artifact
        run: |
          npm run build:native:windows
          npm run postbuild:native
      - name: Verify native artifacts
        shell: pwsh
        run: |
          Write-Host "Listing native files at repository root:"
          Get-ChildItem -Path . -Filter 'roxify_native*.node' -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Get-ChildItem -Path . -Filter 'libroxify_native*.node' -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Write-Host "Listing native files in dist/:"
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Filter 'roxify_native*.node' -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            Get-ChildItem -Path dist -Filter 'libroxify_native*.node' -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host 'dist/ directory not found'
          }
          $found = @()
          $found += Get-ChildItem -Path . -Filter 'roxify_native*.node' -File -ErrorAction SilentlyContinue
          $found += Get-ChildItem -Path . -Filter 'libroxify_native*.node' -File -ErrorAction SilentlyContinue
          if (Test-Path dist) { $found += Get-ChildItem -Path dist -Filter 'roxify_native*.node' -File -ErrorAction SilentlyContinue; $found += Get-ChildItem -Path dist -Filter 'libroxify_native*.node' -File -ErrorAction SilentlyContinue }
          if (-not $found) { Write-Error 'No native artifacts found (root or dist). Ensure build:native:windows and postbuild:native produced files.'; exit 1 } else { Write-Host 'Native artifacts present.' }
      - name: Pack and install globally
        shell: pwsh
        run: |
          npm pack
          $pkg = Get-ChildItem -Filter 'roxify-*.tgz' | Select-Object -First 1
          if (-not $pkg) { Write-Error 'Package not found'; exit 1 }
          npm i -g $pkg.FullName
      - name: Run rox --version
        run: |
          rox --version

  wine:
    if: false
    name: Wine (Linux) smoke test for Windows binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wine and tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y wine64 unzip wget

      - name: Download Windows Node (x64) and prepare Wine C:\\nodejs
        run: |
          NODE_VER=18.20.0
          wget -q https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-win-x64.zip -O node-win.zip
          unzip -q node-win.zip -d node-win
          mkdir -p ~/.wine/drive_c/nodejs
          cp -r node-win/node-v${NODE_VER}-win-x64/* ~/.wine/drive_c/nodejs/
          ~/.wine/drive_c/nodejs/node.exe --version || wine ~/.wine/drive_c/nodejs/node.exe --version

      - name: Build & pack
        run: |
          npm ci
          npm run build
          npm pack

      - name: Copy package and dist into Wine C:\\roxify
        run: |
          mkdir -p ~/.wine/drive_c/roxify
          cp roxify-*.tgz ~/.wine/drive_c/roxify/
          cp -r dist ~/.wine/drive_c/roxify/

      - name: Run CLI with Windows Node under Wine
        run: |
          wine ~/.wine/drive_c/nodejs/node.exe --no-warnings C:\\roxify\\dist\\cli.js --version || true

      - name: Smoke install with npm under Wine (optional)
        run: |
          wine ~/.wine/drive_c/nodejs/npm-cli.js i -g C:\\roxify\\roxify-*.tgz || true
          wine cmd /c rox --version || echo "global install didn't provide rox or rox failed" && true
